services:
  - type: web
    name: edurecall-ai-demo
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /backend-api/health
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      # This service is intentionally a public hackathon demo backed only by
      # synthetic fixtures. Disable the account picker before any real pilot.
      - key: DEMO_MODE
        value: "true"
      - key: AI_PROVIDER
        value: external-llm
      - key: EXTERNAL_LLM_BASE_URL
        value: https://mkp-api.fptcloud.com
      - key: EXTERNAL_LLM_MODEL
        value: DeepSeek-V4-Flash
      - key: EXTERNAL_LLM_TIMEOUT_MS
        value: "60000"
      - key: IDEA_GRADING_PROVIDER_TIMEOUT_MS
        value: "10000"
      - key: EXTERNAL_LLM_API_KEY
        sync: false
      - key: TTS_BASE_URL
        value: https://mkp-api.fptcloud.com
      - key: TTS_MODEL
        value: FPT.AI-VITs
      - key: TTS_VOICE
        value: std_kimngan
      - key: TTS_RESPONSE_FORMAT
        value: wav
      - key: TTS_TIMEOUT_MS
        value: "90000"
